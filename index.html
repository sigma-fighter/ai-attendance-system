<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Attendance Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier"></script>

    <style>
        :root { --p: #3498db; --s: #2ecc71; --bg: #000000; --card: #1c1c1e; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); 
            color: white; 
            margin: 0; 
            display: flex;
            justify-content: center; /* Căn giữa ngang */
            align-items: center;     /* Căn giữa dọc */
            height: 100vh;           /* Full chiều cao màn hình */
            overflow: hidden; 
        }

        /* Khung Camera Chính giữa */
        #video-container { 
            width: 85vw; 
            max-width: 350px; 
            aspect-ratio: 3 / 4; 
            position: relative; 
            border-radius: 40px; 
            overflow: hidden; 
            border: 3px solid var(--p); 
            box-shadow: 0 0 40px rgba(52, 152, 219, 0.4);
            background: #111;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* Kết quả nổi trên Cam */
        .res-box { 
            position: absolute; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(0,0,0,0.7); 
            padding: 8px 25px; 
            border-radius: 25px; 
            border: 1px solid var(--s); 
            backdrop-filter: blur(10px);
            z-index: 5;
        }
        #result { font-size: 1.2rem; font-weight: bold; color: var(--s); }

        /* Panel quản lý & Nhật ký (Ẩn mặc định) */
        .overlay-panel {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 100;
            padding: 30px;
            display: none; /* Ẩn */
            overflow-y: auto;
        }
        .show { display: block; }

        input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 12px; border: none; background: #2c2c2e; color: white; font-size: 1rem; }
        
        /* Menu Bottom Nav */
        .bottom-nav { 
            position: fixed; 
            bottom: 20px; 
            width: 90%; 
            max-width: 400px;
            background: rgba(28, 28, 30, 0.8); 
            backdrop-filter: blur(20px); 
            display: flex; 
            justify-content: space-around; 
            padding: 12px; 
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #8e8e93; font-size: 0.65rem; }
        .nav-item.active { color: var(--p); }
        .nav-icon { font-size: 1.4rem; margin-bottom: 4px; }

        /* Log Item */
        .log-item { background: #2c2c2e; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="video-container">
        <video autoplay playsinline muted id="video"></video>
        <div class="res-box"><div id="result">ĐANG QUÉT...</div></div>
    </div>

    <div id="panel-admin" class="overlay-panel">
        <span class="close-btn" onclick="closePanels()">✕</span>
        <h2>⚙️ Quản lý nhân sự</h2>
        <p id="status" style="color: #f1c40f;">Đang tải AI...</p>
        <input type="text" id="staff-name" placeholder="Nhập tên nhân viên...">
        <button onclick="train()" style="width:100%; padding:15px; background:var(--p); border:none; border-radius:12px; color:white; font-weight:bold;">📸 DẠY KHUÔN MẶT</button>
        <button onclick="saveDataset()" style="width:100%; padding:15px; background:var(--s); border:none; border-radius:12px; color:white; font-weight:bold; margin-top:10px;">💾 LƯU BỘ NÃO</button>
    </div>

    <div id="panel-log" class="overlay-panel">
        <span class="close-btn" onclick="closePanels()">✕</span>
        <h2>🕒 Nhật ký chấm công</h2>
        <div id="log-list"></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="closePanels()">
            <span class="nav-icon">📸</span><span>Camera</span>
        </div>
        <div class="nav-item" onclick="openPanel('panel-log')">
            <span class="nav-icon">📋</span><span>Nhật ký</span>
        </div>
        <div class="nav-item" onclick="exportExcel()">
            <span class="nav-icon">📊</span><span>Xuất Excel</span>
        </div>
        <div class="nav-item" onclick="openPanel('panel-admin')">
            <span class="nav-icon">⚙️</span><span>Cài đặt</span>
        </div>
    </nav>

    <script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const resultText = document.getElementById('result');
    const logList = document.getElementById('log-list');
    
    let classifier = knnClassifier.create();
    let net;
    let videoStream = null;
    let currentFacingMode = 'user'; // Mặc định cam trước
    let attendanceHistory = {}; 

    // 1. HÀM SETUP CAMERA (FIX TRIỆT ĐỂ LỖI MẤT CAM)
    async function setupCamera() {
        // BƯỚC QUAN TRỌNG: Tắt toàn bộ luồng cũ để giải phóng phần cứng
        if (videoStream) {
            videoStream.getTracks().forEach(track => {
                track.stop();
                console.log("Đã dừng track:", track.label);
            });
            video.srcObject = null; 
        }

        const constraints = {
            video: { 
                facingMode: currentFacingMode,
                width: { ideal: 1280 },
                height: { ideal: 720 }
            },
            audio: false
        };

        try {
            videoStream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = videoStream;

            // Hiệu ứng soi gương: Cam trước lật, Cam sau để nguyên
            video.style.transform = currentFacingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';

            return new Promise(resolve => {
                video.onloadedmetadata = () => {
                    video.play();
                    resolve();
                };
            });
        } catch (err) {
            console.error("Lỗi truy cập Camera: ", err);
            status.innerText = "❌ Lỗi: Không thể mở Camera. Hãy tải lại trang!";
        }
    }

    // 2. HÀM SWITCH CAMERA (GỌI LẠI SETUP)
    async function switchCam() {
        currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
        status.innerText = "🔄 Đang đổi sang Camera " + (currentFacingMode === 'user' ? "Trước" : "Sau");
        await setupCamera();
    }

    // 3. CÁC HÀM PANEL (ẨN/HIỆN)
    function openPanel(id) {
        document.querySelectorAll('.overlay-panel').forEach(p => p.classList.remove('show'));
        document.getElementById(id).classList.add('show');
    }

    function closePanels() {
        document.querySelectorAll('.overlay-panel').forEach(p => p.classList.remove('show'));
    }

    // 4. LOGIC CHẤM CÔNG & DẠY AI
    async function train() {
        const name = document.getElementById('staff-name').value || "Ẩn danh";
        const activation = net.infer(video, true);
        classifier.addExample(activation, name);
        status.innerText = `✅ Đã học mặt: ${name}`;
    }

    function record(name) {
        const now = Date.now();
        if (attendanceHistory[name] && (now - attendanceHistory[name] < 10000)) return;
        attendanceHistory[name] = now;
        
        const item = document.createElement('div');
        item.className = 'log-item';
        item.innerHTML = `<span><strong>${name}</strong></span> <span>${new Date().toLocaleTimeString('vi-VN')}</span>`;
        document.getElementById('log-list').prepend(item);
    }

    async function predict() {
        if (classifier.getNumClasses() > 0 && video.readyState === 4) {
            const activation = net.infer(video, true);
            const res = await classifier.predictClass(activation);
            if (res.confidences[res.label] > 0.85) {
                resultText.innerText = res.label;
                record(res.label);
            } else {
                resultText.innerText = "ĐANG QUÉT...";
            }
        }
        requestAnimationFrame(predict);
    }

    // 5. LƯU & XUẤT DỮ LIỆU
    function exportExcel() {
        let csv = "data:text/csv;charset=utf-8,Ho Ten,Gio Co Mat\n";
        document.querySelectorAll('.log-item').forEach(row => {
            csv += row.querySelector('strong').innerText + "," + row.querySelectorAll('span')[1].innerText + "\n";
        });
        const link = document.createElement("a");
        link.href = encodeURI(csv);
        link.download = `Bao_cao_nhan_su.csv`;
        link.click();
    }

    function saveDataset() {
        const ds = classifier.getClassifierDataset();
        const obj = {};
        Object.keys(ds).forEach(k => obj[k] = Array.from(ds[k].dataSync()));
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(obj)], {type:"application/json"}));
        a.download = "face_data.json";
        a.click();
    }

    // 6. KHỞI ĐỘNG
    async function main() {
        status.innerText = "Đang nạp AI...";
        await setupCamera();
        net = await mobilenet.load();
        
        // Tự động nạp bộ não từ file JSON nếu có
        try {
            const res = await fetch('./face_data.json');
            if (res.ok) {
                const json = await res.json();
                const ds = {};
                Object.keys(json).forEach(k => ds[k] = tf.tensor2d(json[k], [json[k].length/1024, 1024]));
                classifier.setClassifierDataset(ds);
                status.innerText = "✅ Đã nạp dữ liệu nhân sự!";
            }
        } catch(e) { console.log("Chưa có file data sẵn."); }

        predict();
    }

    main();
</script>
</body>
</html>
