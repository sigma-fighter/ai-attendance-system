<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Attendance System</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier"></script>

    <style>
        :root { --p: #3498db; --s: #2ecc71; --bg: #000000; --card: #1c1c1e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: white; margin: 0; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; 
        }

        #video-container { 
            width: 85vw; max-width: 350px; aspect-ratio: 3 / 4; 
            position: relative; border-radius: 40px; overflow: hidden; 
            border: 3px solid var(--p); box-shadow: 0 0 40px rgba(52, 152, 219, 0.4);
            background: #111;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        .res-box { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
            background: rgba(0,0,0,0.7); padding: 8px 25px; border-radius: 25px; 
            border: 1px solid var(--s); backdrop-filter: blur(10px); z-index: 5;
        }
        #result { font-size: 1.2rem; font-weight: bold; color: var(--s); text-align: center; min-width: 150px; }

        .overlay-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 100; padding: 30px; display: none; overflow-y: auto;
        }
        .show { display: block !important; }

        input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 12px; border: none; background: #2c2c2e; color: white; font-size: 1rem; }
        button { cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); }

        .bottom-nav { 
            position: fixed; bottom: 20px; width: 90%; max-width: 400px;
            background: rgba(28, 28, 30, 0.8); backdrop-filter: blur(20px); 
            display: flex; justify-content: space-around; padding: 12px; 
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #8e8e93; font-size: 0.65rem; cursor: pointer; }
        .nav-item.active { color: var(--p); }
        .nav-icon { font-size: 1.4rem; margin-bottom: 4px; }

        .log-item { background: #2c2c2e; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="video-container">
        <video autoplay playsinline muted id="video"></video>
        <div class="res-box"><div id="result">Scanning....</div></div>
    </div>

    <div id="panel-admin" class="overlay-panel">
        <span class="close-btn" onclick="closePanels()">✕</span>
        <h2>Manage Staff</h2>
        <p id="status" style="color: #f1c40f;">Loading AI....</p>
        <input type="text" id="staff-name" placeholder="Staff name....">
        <button onclick="train()" style="width:100%; padding:15px; background:var(--p); border:none; border-radius:12px; color:white; font-weight:bold;">Learning Face</button>
        <button onclick="saveDataset()" style="width:100%; padding:15px; background:var(--s); border:none; border-radius:12px; color:white; font-weight:bold; margin-top:10px;">Save Memory</button>
    </div>

    <div id="panel-log" class="overlay-panel">
        <span class="close-btn" onclick="closePanels()">✕</span>
        <h2>Attendance Log</h2>
        <div id="log-list"></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="switchCam()">
            <span class="nav-icon">🔄</span><span>Change Camera</span>
        </div>
        <div class="nav-item" onclick="openPanel('panel-log')">
            <span class="nav-icon">📋</span><span>Log</span>
        </div>
        <div class="nav-item" onclick="exportExcel()">
            <span class="nav-icon">📊</span><span>Export to Excel</span>
        </div>
        <div class="nav-item" onclick="openPanel('panel-admin')">
            <span class="nav-icon">⚙️</span><span>Settings</span>
        </div>
    </nav>

    <script>
        const video = document.getElementById('video');
        const statusText = document.getElementById('status');
        const resultLabel = document.getElementById('result');
        const classifier = knnClassifier.create();
        let net;
        let videoStream = null;
        let currentFacingMode = 'user'; 
        let attendanceHistory = {}; 

        // 1. Hàm thiết lập Camera (Fix triệt để)
        async function setupCam() {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
                audio: false
            };

            try {
                videoStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = videoStream;
                video.style.transform = currentFacingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';

                return new Promise(resolve => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve();
                    };
                });
            } catch (err) {
                console.error("Lỗi cam:", err);
                alert("The camera cannot be opened. Please grant permission!");
            }
        }

        // 2. Hàm Switch Camera
        async function switchCam() {
            closePanels(); // Đảm bảo đóng các bảng để thấy cam
            currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
            resultLabel.innerText = "Switching camera....";
            await setupCam();
            resultLabel.innerText = "Scanning....";
        }

        // 3. Quản lý giao diện
        function openPanel(id) {
            closePanels();
            document.getElementById(id).classList.add('show');
        }
        function closePanels() {
            document.querySelectorAll('.overlay-panel').forEach(p => p.classList.remove('show'));
        }

        // 4. Logic AI
        async function train() {
            const name = document.getElementById('staff-name').value || "Ẩn danh";
            const activation = net.infer(video, true);
            classifier.addExample(activation, name);
            statusText.innerText = `Memory booted: ${name}`;
        }

        async function predict() {
            if (classifier.getNumClasses() > 0 && video.readyState === 4) {
                const activation = net.infer(video, true);
                const res = await classifier.predictClass(activation);
                if (res.confidences[res.label] > 0.85) {
                    resultLabel.innerText = res.label;
                    recordAttendance(res.label);
                } else {
                    resultLabel.innerText = "Scanning....";
                }
            }
            requestAnimationFrame(predict);
        }

        function recordAttendance(name) {
            const now = Date.now();
            if (attendanceHistory[name] && (now - attendanceHistory[name] < 10000)) return;
            attendanceHistory[name] = now;
            
            const item = document.createElement('div');
            item.className = 'log-item';
            item.innerHTML = `<span><strong>${name}</strong></span> <span>${new Date().toLocaleTimeString('vi-VN')}</span>`;
            document.getElementById('log-list').prepend(item);
        }

        // 5. Lưu & Xuất
        function saveDataset() {
    // 1. Lấy tên từ ô Input
    const staffName = document.getElementById('staff-name').value.trim();
    
    // 2. Nếu ô tên trống, dùng tên mặc định, nếu có tên thì dùng tên đó
    const fileName = staffName ? `${staffName}.json` : "face_data.json";

    const ds = classifier.getClassifierDataset();
    if (Object.keys(ds).length === 0) {
        alert("No data to save yet! Please train the AI ​​first.");
        return;
    }

    const obj = {};
    Object.keys(ds).forEach(k => obj[k] = Array.from(ds[k].dataSync()));
    
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(obj)], {type:"application/json"}));
    a.download = fileName; // File tải về sẽ có tên bạn nhập
    a.click();
    
    statusText.innerText = `File exported: ${fileName}`;
}

        function exportExcel() {
            let csv = "data:text/csv;charset=utf-8,        Name        |   Time    \n";
            document.querySelectorAll('.log-item').forEach(row => {
                csv += row.querySelector('strong').innerText + "," + row.querySelectorAll('span')[1].innerText + "\n";
            });
            const link = document.createElement("a");
            link.href = encodeURI(csv);
            link.download = `Staff_report.csv`;
            link.click();
        }

        // 6. Khởi chạy
        async function main() {
            statusText.innerText = "Loading AI.....";
            await setupCam();
            net = await mobilenet.load();
            
            try {
                const res = await fetch('./Staff_report.json');
                if (res.ok) {
                    const json = await res.json();
                    const ds = {};
                    Object.keys(json).forEach(k => ds[k] = tf.tensor2d(json[k], [json[k].length/1024, 1024]));
                    classifier.setClassifierDataset(ds);
                    statusText.innerText = "AI Ready";
                }
            } catch(e) { statusText.innerText = "No data to save yet! Please train the AI ​​first."; }

            predict();
        }

        main();
    </script>
</body>
</html>
